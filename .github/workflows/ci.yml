name: ci

on:
  push:
  pull_request:


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Unit tests
        run: | 
            go test ./testdata/rules_test.go
            go test analyzer_test.go

  build-gcl:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b ./bin v2.10.1
          golangci-lint --version

      - name: Build custom-gcl
        run: |
          ./golangci-lint custom -v
          ./custom-gcl run -v -c .golangci.yaml ./testdata/src/foo/foo.go 
